<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מטרו-טק — קו כחול</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
body{min-height:100vh;direction:rtl;background:#F0F4FA;color:#fff;overflow-x:hidden}

/* ── BACKGROUND ── */
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none}
.circuit{position:absolute;inset:0;opacity:0.4;background-image:
  linear-gradient(rgba(0,100,200,0.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,100,200,0.08) 1px,transparent 1px);
  background-size:40px 40px}

/* ── METRO LINES (vertical curved SVG) ── */
.metro-lines{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;background:#F0F4FA}
.center{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:20px}
.inner{width:100%;max-width:420px;margin:0 auto}

/* ── WHITE CARD ── */
.card{background:#ffffff;border-radius:20px;padding:24px 22px;margin-bottom:16px;border:1.5px solid rgba(0,100,220,0.15);position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,60,160,0.08)}
.card-accent{position:absolute;top:0;right:0;width:6px;height:100%;border-radius:0 20px 20px 0}

/* ── LOGO ── */
.logo-wrap{margin-bottom:16px;text-align:center}

/* ── TRAIN SVG ── */
.train-wrap{margin:0 auto 14px;display:block;text-align:center}

/* ── STATION TRACK ── */
.st-track{display:flex;align-items:center;margin:12px 0 18px;padding:0 4px}
.st-conn{flex:1;height:3px;border-radius:2px}
.st-node{display:flex;flex-direction:column;align-items:center;gap:3px}
.st-dot{width:12px;height:12px;border-radius:50%;border:2.5px solid;position:relative}
.st-dot.past{background:#00B8D9;border-color:#00B8D9;box-shadow:0 0 8px rgba(0,184,217,0.5)}
.st-dot.current{background:#F5A623;border-color:#F5A623;box-shadow:0 0 8px rgba(245,166,35,0.5)}
.st-dot.future{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3)}
.st-lbl{font-size:9px;color:rgba(255,255,255,0.5);white-space:nowrap}
.st-lbl.current{color:#F5A623;font-weight:700}

/* ── TITLE ── */
.title-main{font-size:22px;font-weight:800;color:#07182E;line-height:1.3;text-align:center;margin-bottom:6px}
.title-sub{font-size:13px;color:#555;text-align:center;margin-bottom:20px;line-height:1.5}

/* ── FORM ── */
.lbl{font-size:12px;font-weight:700;color:#444;display:block;margin:14px 0 6px;letter-spacing:0.03em}
.inp{width:100%;padding:12px 14px;background:#F4F7FC;border:1.5px solid #D0DCF0;border-radius:10px;font-size:15px;direction:rtl;font-family:inherit;outline:none;color:#111;transition:border-color 0.2s}
.inp:focus{border-color:#0099DD}
.inp::placeholder{color:#aaa}

/* ── STATION BUTTONS ── */
.sbtn{display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid #D8E4F5;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px;width:100%;font-family:inherit;text-align:right;background:#F8FAFF;color:#222;transition:all 0.15s}
.sbtn:hover{border-color:#b0c4e8;background:#EEF3FC}
.sbtn.sel{font-weight:700;color:#fff}

/* ── MAIN BUTTON ── */
.btn-main{background:linear-gradient(135deg,#0066DD,#00AAFF);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;width:100%;margin-top:14px;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,102,221,0.35);transition:opacity 0.15s}
.btn-main:disabled{opacity:0.35;cursor:default}
.btn-green{background:linear-gradient(135deg,#059669,#00BB77);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;width:100%;margin-top:8px;cursor:pointer;font-family:inherit}
.btn-purple{background:linear-gradient(135deg,#6D28D9,#9333EA);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;width:100%;margin-top:8px;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(109,40,217,0.3)}
.btn-gray{background:#475569;color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;width:100%;margin-top:8px;cursor:pointer;font-family:inherit}
.btn-red{background:#DC2626;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;width:100%;margin-top:8px;cursor:pointer;font-family:inherit}

/* ── TAG ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}

/* ── INFO ROW ── */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #EEF0F5}

/* ── ADMIN BOX ── */
.abox{margin-top:14px;padding:14px;background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px}
.abox-title{font-weight:700;font-size:13px;color:#92400E;margin-bottom:10px}

/* ── DARK CARD (meeting) ── */
.dark-card{background:rgba(4,20,50,0.8);border:1.5px solid rgba(0,150,255,0.25);border-radius:16px;padding:16px;margin-bottom:12px;backdrop-filter:blur(8px)}
.dark-card.green-border{border-color:rgba(0,200,130,0.4)}
.dark-card.blue-glow{box-shadow:0 0 20px rgba(0,120,255,0.15)}

/* ── PARTNER ROW ── */
.partner-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid rgba(255,255,255,0.15)}
.id-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;background:rgba(0,150,255,0.12);border:1px solid rgba(0,180,255,0.3);border-radius:8px;font-size:11px;color:#7DDCFF;margin-top:6px}

/* ── TIMER ── */
.rdot{height:5px;border-radius:3px;transition:all 0.3s}
.chip{background:#EEF2FF;color:#4F46E5;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;display:inline-block;border:1px solid #C7D2FE}

/* ── NEXT BOX ── */
.next-box{background:#F0FDF8;border:1.5px solid #6EE7B7;border-radius:12px;padding:12px;margin-bottom:12px}


</style>
</head>

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

const STATIONS=[
  {id:"pre",    label:"קדם מכינה",       emoji:"🌱",color:"#7BC843",bg:"#F0FDF4",txt:"#14532D",line:"#7BC843"},

];
const GROUPS=[
  {id:"pink",  label:"קבוצה ורודה",  emoji:"🌸", color:"#E91E8C", bg:"#FDF2F8", txt:"#831843"},
  {id:"green", label:"קבוצה ירוקה",  emoji:"🌿", color:"#16A34A", bg:"#F0FDF4", txt:"#14532D"},
  {id:"blue",  label:"קבוצה כחולה",  emoji:"💙", color:"#2563EB", bg:"#EFF6FF", txt:"#1E3A8A"},
  {id:"yellow",label:"קבוצה צהובה",  emoji:"🌟", color:"#CA8A04", bg:"#FEFCE8", txt:"#713F12"},
];

  "מה גרם לך לבחור או לשקול את הדרך לעולם ההייטק?",
  "מה היה יותר קשה או מבלבל ממה שציפית? / מה נראה לך שיהיה הכי קשה?",
  "טעות שעשית בדרך — או טעות שאתה.את חושש.ת לעשות",
  "מה עזר לך להמשיך כשהיה קשה? / מה לדעתך יעזור לך לא לוותר?",
];

let timerTO=null, adminMode=false, tapN=0, tapTO=null;
let selSt=localStorage.getItem("conf_station")||"";
let selGr=localStorage.getItem("conf_group")||"";

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const stOf=id=>STATIONS.find(s=>s.id===id)||STATIONS[0];
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

onValue(ref(db,"conf"),snap=>{
  const d=snap.val()||{};
  conf=d.state||null;
  parts=d.participants?Object.values(d.participants):[];
  render();
});

function pairWithinGroup(groupPs, met){
  // interleave by station for diversity
  const pools=STATIONS.map(s=>[...groupPs.filter(p=>p.station===s.id)].sort(()=>Math.random()-.5));
  const iv=[];const ml=Math.max(...pools.map(a=>a.length),0);
  for(let i=0;i<ml;i++) pools.forEach(a=>a[i]&&iv.push(a[i]));
  const used={},pairs=[];
  for(const a of iv){
    if(used[a.id]) continue;
    let best=null,bs=-Infinity;
    for(const b of iv){
      if(b.id===a.id||used[b.id]) continue;
      if(!met[a.id]) met[a.id]={};
      const sc=(a.station!==b.station?4:0)+(!met[a.id][b.id]?2:0)+Math.random();
      if(sc>bs){bs=sc;best=b;}
    }
    if(best){
      pairs.push({ids:[a.id,best.id]});
      used[a.id]=used[best.id]=true;
      if(!met[a.id])met[a.id]={};if(!met[best.id])met[best.id]={};
      met[a.id][best.id]=met[best.id][a.id]=true;
    }
  }
  const odd=iv.find(p=>!used[p.id]);
  if(odd&&pairs.length>0) pairs[pairs.length-1].ids.push(odd.id);
  return pairs;
}

function assignGroups(ps){
  // randomly assign participants to groups (3 or 4 based on count)
  const numGroups = ps.length > 60 ? 4 : 3;
  const gIds = GROUPS.slice(0, numGroups).map(g=>g.id);
  // shuffle participants
  const shuffled = [...ps].sort(()=>Math.random()-.5);
  // distribute round-robin to balance group sizes
  const assigned = {};
  shuffled.forEach((p,i)=>{ assigned[p.id]=gIds[i%numGroups]; });
  return assigned;
}

function buildPairings(ps, rounds, groupAssignment){
  const met={};ps.forEach(p=>met[p.id]={});
  return Array.from({length:rounds},()=>{
    const allPairs=[];
    const numGroups = ps.length > 60 ? 4 : 3;
    const gIds = GROUPS.slice(0, numGroups).map(g=>g.id);
    gIds.forEach(gId=>{
      const gps=ps.filter(p=>(groupAssignment||{})[p.id]===gId);
      if(gps.length>0) allPairs.push(...pairWithinGroup(gps,met));
    });
    return allPairs;
  });
}



function screen(){
  if(!myId||!parts.some(p=>p.id===myId)) return "reg";
  if(!conf||conf.phase==="registration") return "wait";
  return conf.phase;
}

const TRACK_HTML=``;

const tagH=id=>{const s=stOf(id);return `<span class="tag" style="background:${s.bg};color:${s.txt}">${s.emoji} ${s.label}</span>`;};
const abox=inner=>adminMode?`<div class="abox"><div class="abox-title">🔧 פאנל מנחה</div>${inner}<button class="btn-red" onclick="aReset()">🗑 איפוס מוחלט</button></div>`:"";

/* ── REGISTER ── */
function rReg(){
  document.getElementById("app").innerHTML=`<div class="page"><div class="center"><div class="inner">
    <div style="text-align:center;padding:20px 0 8px">${LOGO_SVG}</div>
    
    ${TRAIN_SVG}
    <div class="card">
      <div class="card-accent" style="background:linear-gradient(180deg,#00B8D9,#7BC843,#E91E8C,#F5A623)"></div>
      <h2 class="title-main" style="font-size:26px;margin-bottom:18px">הגיע הזמן שנכיר</h2>
      ${TRACK_HTML}
      <label class="lbl">שם מלא</label>
      <input class="inp" id="ni" autocomplete="name" oninput="chk()" onkeydown="if(event.key==='Enter')reg()"/>
      <label class="lbl">אני כרגע ב...</label>
      ${STATIONS.map(s=>`<button class="sbtn${selSt===s.id?" sel":""}" id="sb_${s.id}" onclick="setSt('${s.id}')"
        style="${selSt===s.id?`border-color:${s.color};background:${s.color};color:#fff`:`border-color:${s.color}30`}">
        <span style="font-size:18px">${s.emoji}</span><span>${s.label}</span></button>`).join("")}
      <label class="lbl">איך יזהו אותך מהקצה השני של החדר?</label>
      <input class="inp" id="bi" placeholder="למשל: חולצה כחולה, שיער קצר..." oninput="chk()" autocomplete="off"/>
      <button class="btn-main" id="rb" onclick="reg()" disabled>כניסה לכנס ✓</button>
      ${parts.length>0?`<p style="text-align:center;margin-top:10px;font-size:12px;color:#777">${parts.length} משתתפים כבר בפנים</p>`:""}
    </div>
    ${abox(`<button class="btn-green" onclick="aStart()">▶ התחל סיבוב ראשון (${parts.length} נרשמו)</button>`)}
  </div></div></div>`;
  const sv=localStorage.getItem("conf_nick");if(sv) document.getElementById("ni").value=sv;
  const svb=localStorage.getItem("conf_badge");if(svb){const b=document.getElementById("bi");if(b)b.value=svb;}
  chk();
}

/* ── WAITING ── */
function rWait(){
  const me=parts.find(p=>p.id===myId);
  document.getElementById("app").innerHTML=`<div class="page"><div class="center"><div class="inner">
    <div style="text-align:center;padding:20px 0 8px">${LOGO_SVG}</div>
    ${TRAIN_SVG}
    <div class="card">
      <div class="card-accent" style="background:linear-gradient(180deg,#00B8D9,#7BC843,#E91E8C,#F5A623)"></div>
      <div style="text-align:center;font-size:32px;margin-bottom:6px">⏳</div>
      <h2 class="title-main" style="font-size:20px" onclick="tap()">אתם בפנים!</h2>
      ${me?`<div style="text-align:center;margin:6px 0 10px">${tagH(me.station)}</div>`:""}
      <p class="title-sub" style="margin-bottom:14px">ממתינים למנחה שיתחיל את הסיבוב הראשון</p>
      <div style="background:#F4F7FC;border-radius:12px;padding:14px;border:1px solid #D8E4F5">
        <p style="font-size:12px;font-weight:700;color:#555;margin-bottom:10px">👥 בחדר עכשיו: ${parts.length} משתתפים</p>
        ${STATIONS.map(s=>`<div class="info-row">
          <span style="font-size:13px;color:#333">${s.emoji} ${s.label}</span>
          <span class="tag" style="background:${s.bg};color:${s.txt}">${parts.filter(p=>p.station===s.id).length}</span>
        </div>`).join("")}
      </div>
    </div>
    ${abox(`<button class="btn-green" onclick="aStart()">▶ התחל סיבוב ראשון (${parts.length} משתתפים)</button>`)}
  </div></div></div>`;
}

/* ── MEETING ── */
function rMeet(){
  const rev=conf?.questionRevealed??false, r=conf?.currentRound??0, tot=conf?.totalRounds??ROUNDS;
  const Q=QUESTIONS[r%QUESTIONS.length], me=parts.find(p=>p.id===myId);
  const pair=(conf?.pairings?.[r]||[]).find(p=>p.ids.includes(myId));
  const partners=pair?pair.ids.filter(id=>id!==myId).map(id=>parts.find(p=>p.id===id)).filter(Boolean):[];
  const dots=Array.from({length:tot},(_,i)=>`<div class="rdot" style="background:${i<=r?"#00AAFF":"rgba(255,255,255,0.15)"};width:${i===r?"22px":"5px"}"></div>`).join("");
  const pHTML=partners.length===0
    ?`<p style="color:rgba(255,255,255,0.35);font-size:14px">ממתין לשיבוץ...</p>`
    :partners.map(p=>{const s=stOf(p.station);return`
      <div style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div class="partner-avatar" style="background:${s.bg}">${s.emoji}</div>
          <div><p style="font-weight:700;font-size:18px;line-height:1.2;color:#fff">${p.nickname}</p><span>${tagH(p.station)}</span></div>
        </div>
        ${p.badge?`<div class="id-chip">👁 ${p.badge}</div>`:""}
      </div>`;}).join("");

  document.getElementById("app").innerHTML=`<div class="page" style="background:#07182E"><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">
    <div onclick="tap()" style="cursor:default;margin-bottom:10px">${LOGO_SMALL}</div>
    
    <div style="display:flex;gap:5px;margin-bottom:10px">${dots}</div>
    <p style="color:rgba(255,255,255,0.3);font-size:11px;margin-bottom:14px">סיבוב ${r+1} מתוך ${tot}</p>
    <div style="position:relative;margin-bottom:14px">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="${rev?"#00AAFF":"#334155"}" stroke-width="8"
          stroke-dasharray="${ARC}" stroke-dashoffset="0" stroke-linecap="round"
          style="transform:rotate(-90deg);transform-origin:60px 60px;transition:stroke-dashoffset 1s linear" id="arc"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <span style="font-size:26px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums" id="ttxt">${rev?fmt(SECS):"⏳"}</span>
      </div>
    </div>
    <div id="tdone"></div>
    <div style="padding:10px 14px;background:rgba(0,40,90,0.7);border:1px solid rgba(0,150,255,0.2);border-radius:10px;width:100%;max-width:400px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <p style="font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:2px">👁 הזיהוי שלך</p>
        <p style="font-size:14px;color:#fff;font-weight:600">${me?.badge||""}</p>
      </div>
      ${(()=>{const ga=conf?.groupAssignment||{};const gId=ga[myId];const g=GROUPS.find(x=>x.id===gId);return g?`<span style="background:${g.color};color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700">${g.emoji} ${g.label}</span>`:""})()}
    </div>
    <div class="dark-card blue-glow" style="width:100%;max-width:400px">
      <p style="font-size:10px;color:#777;font-weight:700;margin-bottom:12px;letter-spacing:0.08em">🤝 פוגשים עכשיו</p>
      ${pHTML}
    </div>
    <div style="width:100%;max-width:400px;border-radius:14px;padding:14px;margin-bottom:10px;${rev?"background:rgba(0,80,180,0.3);border:1.5px solid rgba(0,180,255,0.4)":"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)"}">
      <p style="font-size:10px;color:${rev?"#93C5FD":"rgba(255,255,255,0.22)"};font-weight:700;margin-bottom:8px;letter-spacing:0.08em">💬 שאלה לשיחה</p>
      ${rev?`<p style="color:#DBEAFE;font-size:15px;line-height:1.7">${Q}</p>`:`<p style="color:rgba(255,255,255,0.25);font-size:13px;text-align:center">ממתינים למנחה שיציג את השאלה...</p>`}
    </div>
    ${adminMode?`<div style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:6px">
      ${!rev?`<button class="btn-purple" onclick="aReveal()">▶ הצג שאלה והתחל טיימר</button>`:""}
      ${rev?`<button class="btn-gray" onclick="aEnd()">⏸ סיים סיבוב</button>`:""}
      <button class="btn-red" onclick="aReset()">🗑 איפוס</button>
    </div>`:""}
  </div></div>`;

  if(rev&&conf?.timerStart){
    const tick=()=>{
      const left=Math.max(0,SECS-Math.floor((Date.now()-conf.timerStart)/1000));
      const arc=document.getElementById("arc"),t=document.getElementById("ttxt"),dm=document.getElementById("tdone");
      if(!arc)return;
      arc.setAttribute("stroke-dashoffset",ARC*(1-left/SECS));
      const done=left===0,urg=left>0&&left<=30;
      arc.setAttribute("stroke",done?"#EF4444":urg?"#F97316":"#00AAFF");
      if(t){t.textContent=done?"⏰":fmt(left);t.style.color=done?"#EF4444":"#fff";}
      if(dm)dm.innerHTML=done?`<div style="background:#7F1D1D;color:#FCA5A5;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;margin-bottom:10px;text-align:center">⏰ הזמן הסתיים — ממתינים למנחה</div>`:"";
      if(!done)timerTO=setTimeout(tick,500);
    };tick();
  }
}

/* ── BETWEEN ── */
function rBetween(){
  const r=conf?.currentRound??0,tot=conf?.totalRounds??ROUNDS,nr=r+1,done=nr>=tot;
  const np=done||!conf?.pairings?.[nr]?[]:(conf.pairings[nr]||[]).find(p=>p.ids.includes(myId))?.ids.filter(id=>id!==myId).map(id=>parts.find(p=>p.id===id)).filter(Boolean)||[];
  document.getElementById("app").innerHTML=`<div class="page"><div class="center"><div class="inner">
    <div style="text-align:center;padding:16px 0 6px">${LOGO_SVG}</div>
    <div class="card">
      <div class="card-accent" style="background:linear-gradient(180deg,#00B8D9,#7BC843,#E91E8C,#F5A623)"></div>
      <div style="text-align:center;font-size:32px;margin-bottom:6px">${done?"🏁":"🔔"}</div>
      <h2 class="title-main" style="font-size:20px" onclick="tap()">${done?"כל הסיבובים הסתיימו!":`סיבוב ${r+1} הסתיים!`}</h2>
      <p class="title-sub">${done?"כל החיבורים הושלמו — כל הכבוד!":`ממתינים למנחה לסיבוב ${nr+1}`}</p>
      <div style="text-align:center;margin-bottom:14px"><span class="chip">סיבוב ${r+1} מתוך ${tot}</span></div>
      ${!done&&np.length>0?`<div class="next-box">
        <p style="font-size:11px;font-weight:700;color:#059669;margin-bottom:10px">🎯 בסיבוב הבא תפגשו:</p>
        ${np.map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:20px">${stOf(p.station).emoji}</span>
          <span style="font-weight:700;font-size:17px;color:#111">${p.nickname}</span>
          ${tagH(p.station)}
        </div>
        ${p.badge?`<div style="font-size:12px;color:#059669;padding-right:4px;margin-bottom:4px">👁 ${p.badge}</div>`:""}`).join("")}
      </div>`:(!done?`<div style="background:#FFFBEB;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#92400E;text-align:center">⚠️ לא נמצא שיבוץ — פנה.י למנחה</div>`:"")}
    </div>
    ${abox(!done?`<button class="btn-green" onclick="aNext()">▶ התחל סיבוב ${nr+1}</button>`:`<button class="btn-purple" onclick="aNext()">🏁 סיים כנס</button>`)}
  </div></div></div>`;
}

/* ── DONE ── */
function rDone(){
  document.getElementById("app").innerHTML=`<div class="page"><div class="center"><div class="inner">
    <div style="text-align:center;padding:20px 0 8px">${LOGO_SVG}</div>
    ${TRAIN_SVG}
    <div class="card" style="text-align:center">
      <div class="card-accent" style="background:linear-gradient(180deg,#00B8D9,#7BC843,#E91E8C,#F5A623)"></div>
      <div style="font-size:44px;margin-bottom:10px">🌟</div>
      <h2 class="title-main" onclick="tap()">תודה שהשתתפתם!</h2>
      <p class="title-sub">ניפגשנו, שוחחנו ולמדנו יחד — הדרך ממשיכה!</p>
      <div style="background:#EEF2FF;border-radius:14px;padding:20px;margin-top:14px">
        <p style="font-size:13px;color:#666;margin-bottom:4px">השתתפו בכנס</p>
        <p style="font-size:48px;font-weight:800;color:#4338CA">${parts.length}</p>
        <p style="font-size:14px;color:#777;margin-top:4px">משתתפים</p>
      </div>
      ${adminMode?`<button class="btn-red" style="margin-top:14px" onclick="aReset()">🗑 איפוס מוחלט</button>`:""}
    </div>
  </div></div></div>`;
}

/* ── INTERACTIONS ── */
function tap(){clearTimeout(tapTO);tapN++;if(tapN>=5){adminMode=!adminMode;tapN=0;render();return;}tapTO=setTimeout(()=>tapN=0,3000);}
function setGr(id){
  selGr=id;localStorage.setItem("conf_group",id);
  document.querySelectorAll(".sbtn[id^='gb_']").forEach(b=>{
    const g=GROUPS.find(x=>x.id===b.id.replace("gb_",""));
    if(!g)return;
    if(g.id===id){b.style.borderColor=g.color;b.style.background=g.color;b.style.color="#fff";b.style.fontWeight="700";}
    else{b.style.borderColor=g.color+"30";b.style.background="#F8FAFF";b.style.color="#222";b.style.fontWeight="400";}
  });
  chk();
}
function setSt(id){
  selSt=id;localStorage.setItem("conf_station",id);
  document.querySelectorAll(".sbtn").forEach(b=>{
    const s=stOf(b.id.replace("sb_",""));
    b.classList.remove("sel");
    b.style.borderColor=`${s.color}30`;b.style.background="#F9FAFB";b.style.color="#333";b.style.fontWeight="400";
  });
  const btn=document.getElementById("sb_"+id);
  if(btn){const s=stOf(id);btn.classList.add("sel");btn.style.borderColor=s.color;btn.style.background=s.color;btn.style.color="#fff";btn.style.fontWeight="700";}
  chk();
}
function chk(){const n=document.getElementById("ni")?.value.trim(),bd=document.getElementById("bi")?.value.trim(),b=document.getElementById("rb");if(b)b.disabled=!(n&&selSt&&bd);}
async function reg(){
  const n=document.getElementById("ni")?.value.trim(),bd=document.getElementById("bi")?.value.trim();
  if(!n||!selSt||!bd)return;
  if(!myId){myId=uid();localStorage.setItem("conf_myid",myId);}
  localStorage.setItem("conf_nick",n);localStorage.setItem("conf_badge",bd);
  await set(ref(db,`conf/participants/${myId}`),{id:myId,nickname:n,station:selSt,badge:bd});
  const s=await get(ref(db,"conf/state"));
  if(!s.val()) await set(ref(db,"conf/state"),{phase:"registration",currentRound:0,totalRounds:ROUNDS,timerStart:null,questionRevealed:false,pairings:null});
}
function renderAdmin(){
  const grAssign=conf?.groupAssignment||{};
  const numGroups=parts.length>60?4:3;
  const gLabels=GROUPS.slice(0,numGroups);
  const phase=conf?.phase||"registration";
  const round=conf?.currentRound??0;
  const total=conf?.totalRounds??ROUNDS;
  const rev=conf?.questionRevealed??false;

  const groupStats=gLabels.map(g=>{
    const gps=parts.filter(p=>grAssign[p.id]===g.id);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #EEF0F5">
      <span style="font-size:13px;color:#333;font-weight:600">${g.emoji} ${g.label}</span>
      <span class="tag" style="background:${g.bg};color:${g.txt}">${gps.length} משתתפים</span>
    </div>`;
  }).join("");

  const stationStats=STATIONS.map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #EEF0F5">
      <span style="font-size:12px;color:#444">${s.emoji} ${s.label}</span>
      <span class="tag" style="background:${s.bg};color:${s.txt}">${parts.filter(p=>p.station===s.id).length}</span>
    </div>`).join("");

  const roundDots=Array.from({length:total},(_,i)=>
    `<div style="height:8px;border-radius:4px;background:${i<=round?"#0066DD":"#D0DCF0"};width:${i===round?"28px":"8px"};transition:all 0.3s"></div>`).join("");

  document.getElementById("app").innerHTML=`<div class="page" style="background:#F0F4FA;min-height:100vh;padding:20px">
    <div style="max-width:480px;margin:0 auto">
      <div style="text-align:center;margin-bottom:16px">
        <svg width="180" height="54" viewBox="0 0 180 54"><text x="92" y="38" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="900" fill="#07182E" letter-spacing="-1">מטרו-טק</text><g transform="translate(4,6)"><polygon points="0,0 16,0 26,8 16,16 0,16 10,8" fill="#7BC843"/><polygon points="0,18 18,18 30,27 18,36 0,36 12,27" fill="#F5A623"/><polygon points="0,38 20,38 31,44 20,50 0,50" fill="#E91E8C"/><rect x="0" y="44" width="22" height="8" fill="#00B8D9"/></g></svg>
        <div style="font-size:11px;color:#888;margin-top:2px;letter-spacing:0.08em">פאנל מנחה</div>
      </div>

      <!-- Status bar -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-bar" style="background:linear-gradient(180deg,#00B8D9,#7BC843,#E91E8C,#F5A623)"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-weight:700;font-size:14px;color:#07182E">סטטוס כנס</span>
          <span style="background:${phase==="registration"?"#FEF3C7":phase==="meeting"?"#DCFCE7":phase==="between"?"#EEF2FF":"#F1F5F9"};color:${phase==="registration"?"#92400E":phase==="meeting"?"#14532D":phase==="between"?"#3730A3":"#475569"};border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700">
            ${phase==="registration"?"רישום פתוח":phase==="meeting"?"סיבוב פעיל":phase==="between"?"בין סיבובים":phase==="done"?"הסתיים":"רישום"}
          </span>
        </div>
        <div style="display:flex;gap:5px;margin-bottom:8px">${roundDots}</div>
        <div style="font-size:12px;color:#666">סיבוב ${round+1} מתוך ${total} | ${parts.length} משתתפים נרשמו</div>
      </div>

      <!-- Participants breakdown -->
      <div class="card" style="margin-bottom:12px">
        <div class="card-bar" style="background:#0066DD"></div>
        <div style="font-weight:700;font-size:14px;color:#07182E;margin-bottom:12px">👥 משתתפים לפי מסלול</div>
        ${stationStats}
        <div style="margin-top:10px;padding-top:8px;border-top:2px solid #EEF0F5;font-size:12px;color:#666">
          ${parts.length>60?`יחולקו ל-4 קבוצות`:`יחולקו ל-3 קבוצות`} (${parts.length>60?"מעל":"עד"} 60 משתתפים)
        </div>
      </div>

      <!-- Groups breakdown (after assignment) -->
      ${Object.keys(grAssign).length>0?`<div class="card" style="margin-bottom:12px">
        <div class="card-bar" style="background:linear-gradient(180deg,#E91E8C,#F5A623)"></div>
        <div style="font-weight:700;font-size:14px;color:#07182E;margin-bottom:12px">🎨 חלוקה לקבוצות</div>
        ${groupStats}
      </div>`:""}

      <!-- Action buttons -->
      <div class="card">
        <div class="card-bar" style="background:#059669"></div>
        <div style="font-weight:700;font-size:14px;color:#07182E;margin-bottom:14px">⚙️ שליטה בכנס</div>

        ${phase==="registration"?`
          <button class="btn-main" style="margin-top:0" onclick="aStart()">🚀 הקצה קבוצות והתחל סיבוב 1</button>
          <div style="font-size:11px;color:#888;text-align:center;margin-top:6px">יחלק אוטומטית ${parts.length} משתתפים ל-${parts.length>60?4:3} קבוצות מעורבות</div>
        `:""}

        ${phase==="meeting"&&!rev?`
          <button class="btn-main" style="margin-top:0;background:linear-gradient(135deg,#6D28D9,#9333EA)" onclick="aReveal()">▶ הצג שאלה והתחל טיימר — לכל הקבוצות</button>
        `:""}

        ${phase==="meeting"&&rev?`
          <button class="btn-main" style="margin-top:0;background:#475569" onclick="aEnd()">⏸ סיים סיבוב ${round+1}</button>
        `:""}

        ${phase==="between"?`
          <button class="btn-main" style="margin-top:0" onclick="aNext()">${round+1>=(conf?.totalRounds||ROUNDS)?"🏁 סיים כנס":"▶ התחל סיבוב "+(round+2)+" — כל הקבוצות"}</button>
        `:""}

        ${phase==="done"?`<div style="text-align:center;font-size:14px;color:#059669;font-weight:700;margin:8px 0">🏁 הכנס הסתיים!</div>`:""}

        <button style="background:none;border:1.5px solid #FCD34D;color:#92400E;border-radius:10px;padding:10px;font-size:12px;font-weight:600;width:100%;margin-top:10px;cursor:pointer;font-family:inherit" onclick="aReset()">🗑 איפוס מוחלט</button>
      </div>
    </div>
  </div>`;
}

async function aStart(){
  const grAssign=assignGroups(parts);
  const pairings=buildPairings(parts,ROUNDS,grAssign);
  await set(ref(db,"conf/state"),{phase:"meeting",currentRound:0,totalRounds:ROUNDS,timerStart:null,questionRevealed:false,pairings,groupAssignment:grAssign});
}
async function aReveal(){await set(ref(db,"conf/state"),{...conf,timerStart:Date.now(),questionRevealed:true});}
async function aEnd(){await set(ref(db,"conf/state"),{...conf,phase:"between"});}
async function aNext(){const n=(conf.currentRound||0)+1;await set(ref(db,"conf/state"),n>=(conf.totalRounds||ROUNDS)?{...conf,phase:"done"}:{...conf,phase:"meeting",currentRound:n,timerStart:null,questionRevealed:false});}
async function aReset(){if(!confirm("איפוס מוחלט?"))return;await set(ref(db,"conf"),{state:{phase:"registration",currentRound:0,totalRounds:ROUNDS,timerStart:null,questionRevealed:false,pairings:null},participants:{}});localStorage.removeItem("conf_myid");localStorage.removeItem("conf_nick");localStorage.removeItem("conf_station");localStorage.removeItem("conf_badge");myId=null;selSt="";adminMode=false;}

window.tap=tap;window.setSt=setSt;window.chk=chk;window.reg=reg;
window.aStart=aStart;window.aReveal=aReveal;window.aEnd=aEnd;window.aNext=aNext;window.aReset=aReset;
</script>


</body>
</html>
